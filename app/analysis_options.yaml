# Static analysis configuration for DuoBudget.
#
# Starts from the recommended Flutter lint set and tightens it: strict type
# checking, extra correctness/style lints, and a hard exclusion of generated
# code (drift + riverpod codegen output).

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat unused code as a warning, never silent info.
    unused_import: warning
    unused_local_variable: warning
    dead_code: warning
    # A missing return type must never sneak in.
    always_declare_return_types: error
  exclude:
    - "**/*.g.dart"
    - "**/*.drift.dart"
    - "**/*.freezed.dart"
    - "**/generated_plugin_registrant.dart"

linter:
  rules:
    # Correctness
    avoid_dynamic_calls: true
    avoid_slow_async_io: true
    cancel_subscriptions: true
    close_sinks: true
    literal_only_boolean_expressions: true
    no_adjacent_strings_in_list: true
    throw_in_finally: true
    unnecessary_statements: true

    # Style / consistency
    always_use_package_imports: true
    prefer_single_quotes: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    directives_ordering: true
    require_trailing_commas: true
    unawaited_futures: true
    use_super_parameters: true
